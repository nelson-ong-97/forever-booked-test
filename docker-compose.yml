services:
  postgres:
    image: postgres:16-alpine
    container_name: foreverbooked-db
    restart: unless-stopped
    ports:
      - "4040:5432"
    environment:
      POSTGRES_USER: foreverbooked
      POSTGRES_PASSWORD: foreverbooked
      POSTGRES_DB: foreverbooked
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foreverbooked"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
